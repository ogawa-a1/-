<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<title>ニュース接触タイプ診断</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
  background: #f5f7fb;
  color: #222;
}
.panel {
  background: white;
  border: 1px solid #ddd;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,.05);
}
.title {
  font-weight: bold;
  font-size: 20px;
  margin-bottom: 8px;
}
.q {
  margin: 12px 0;
}
.answers {
  margin-top: 16px;
}
.answer-btn, .retry-btn {
  display: block;
  width: 100%;
  text-align: left;
  margin-bottom: 10px;
  padding: 12px 14px;
  border: 1px solid #ccc;
  border-radius: 6px;
  background: #fff;
  cursor: pointer;
  transition: 0.2s;
}
.answer-btn:hover, .retry-btn:hover {
  background: #eef5ff;
  border-color: #4a90e2;
}
.card {
  border: 1px solid #f0c419;
  background: #fff9dc;
  padding: 16px;
  border-radius: 8px;
}
.name {
  font-size: 18px;
  font-weight: bold;
  color: #b58900;
}
.desc {
  margin-top: 6px;
}
.progress {
  margin-bottom: 10px;
  font-size: 14px;
  color: #666;
}
</style>
</head>
<body>

<div class="panel" id="intro">
  <div class="title">5つの質問に答えて、あなたのニュースとの付き合い方をチェックしよう！</div>
  <div>ニュースの取り方のタイプを、あなたの回答パターンから動物キャラクターで診断します。</div>
</div>

<div id="quiz"></div>

<div class="panel" id="resultArea" style="display:none;">
  <div class="title">診断結果</div>
  <div id="resultCard" class="card"></div>
  <div id="article" style="margin-top:12px;">
    <strong>おすすめ記事</strong>
    <div style="margin-top:6px;">
      👉 朝日新聞の若手記者が聞いた！新しいマスメディアの形は？RehacQ高橋氏の答えは
    </div>
  </div>
  <button class="retry-btn" id="retryBtn">もう一度診断する</button>
</div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const QUESTIONS = [
    { text: "Q1. 新しいニュースを知るとき、あなたのスタイルに近いのは？", answers: [
      "自分でキーワード検索したり、ニュースアプリを巡回する",
      "SNSのタイムラインや、友達からのシェアで自然と知る"
    ] },
    { text: "Q2. あなたがよく見るニュースのジャンルは？", answers: [
      "政治経済からエンタメ、スポーツまで幅広くチェックする",
      "好きなアイドルや趣味、特定の社会問題など、関心事が中心"
    ] },
    { text: "Q3. 衝撃的なニュースを見たとき、あなたの最後の反応は？", answers: [
      "「これは本当？」「他のメディアではどう報じている？」と事実関係が気になる",
      "「すごい！」「ありえない！」と、まず感情的に反応する"
    ] },
    { text: "Q4. 面白い記事や動画を見つけたら、どうすることが多い？", answers: [
      "SNSでシェアしたり、友達に「これ見て！」とすぐ教える",
      "自分の中で楽しんで、特に誰かに言うことは少ない"
    ] },
    { text: "Q5. 情報源について、あなたの考えに近いのは？", answers: [
      "複数のメディアや専門家の意見を比較して、多角的に判断したい",
      "信頼している特定のメディアやインフルエンサーがいれば十分"
    ] }
  ];

  const ANIMAL_TYPES = {
    "11111": {name: "🦅 博識のジャーナリスト・ワシ", description: "空から世界を見渡すように、広く深く情報を集め、分析し、発信するリーダー。あなたの発言は多くの人に影響を与えるでしょう。"},
    "11112": {name: "🐬 情報司令塔・イルカ", description: "広い海の情報を集め、仲間と共有するのが得意。分析力と発信力を兼ね備え、コミュニティの中心で活躍する人気者です。"},
    "11121": {name: "🦉 知の探求者・フクロウ", description: "幅広い知識を冷静に分析し、自分の内なる知恵として蓄える賢者。物事の本質を見抜く力を持っています。"},
    "11122": {name: "🦫 情報収集家・ビーバー", description: "コツコツと広範囲から情報を集め、自分の知識のダムを築く努力家。その知識は、いつか大きな価値を生み出します。"}
  };

  const defaultType = {
    name: "❓ ミステリアスな存在",
    description: "あなたは規格外のユニークな存在です！"
  };

  let currentQuestionIndex = 0;
  let selectedAnswers = [];

  const quizDiv = document.getElementById("quiz");
  const resultArea = document.getElementById("resultArea");
  const resultCard = document.getElementById("resultCard");
  const retryBtn = document.getElementById("retryBtn");

  function renderCurrentQuestion() {
    quizDiv.innerHTML = "";

    if (currentQuestionIndex >= QUESTIONS.length) {
      showResult();
      return;
    }

    const q = QUESTIONS[currentQuestionIndex];

    const panel = document.createElement("div");
    panel.className = "panel q";

    const progress = document.createElement("div");
    progress.className = "progress";
    progress.textContent = `${currentQuestionIndex + 1} / ${QUESTIONS.length}`;

    const title = document.createElement("div");
    title.className = "title";
    title.textContent = q.text;

    const answers = document.createElement("div");
    answers.className = "answers";

    q.answers.forEach((ans, i) => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "answer-btn";
      btn.textContent = `${i + 1}. ${ans}`;
      btn.addEventListener("click", () => {
        selectedAnswers.push(String(i + 1));
        currentQuestionIndex++;
        renderCurrentQuestion();
      });
      answers.appendChild(btn);
    });

    panel.appendChild(progress);
    panel.appendChild(title);
    panel.appendChild(answers);
    quizDiv.appendChild(panel);
  }

  function showResult() {
    const key = selectedAnswers.join("");
    const finalType = ANIMAL_TYPES[key] || defaultType;

    quizDiv.innerHTML = "";
    resultCard.innerHTML = `
      <div class="name">${finalType.name}</div>
      <div class="desc">${finalType.description}</div>
    `;

    resultArea.style.display = "block";
    resultArea.scrollIntoView({ behavior: "smooth" });
  }

  retryBtn.addEventListener("click", () => {
    currentQuestionIndex = 0;
    selectedAnswers = [];
    resultArea.style.display = "none";
    renderCurrentQuestion();
  });

  renderCurrentQuestion();
});
</script>
</body>
</html>
